name: Wiz IaC Scan

on:
  workflow_call:
    inputs:
      repo_url:
        required: true
        type: string

jobs:
  wiz-iac-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v3
        with:
          repository: ${{ inputs.repo_url }}

      - name: Install Wiz CLI
        run: curl -sSL https://wiz.io/cli | bash

      - name: Run Wiz IaC Scan
        env:
          WIZ_API_TOKEN: ${{ secrets.WIZ_API_TOKEN }}
        run: wiz iac scan --path terraform/
